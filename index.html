<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- 2026-05-18: anti-stale-chunks. Browser nunca cacheia o index, sempre
         baixa fresh. Sem isso, deploys novos invalidam chunks com hash mas
         user com aba aberta tinha cache do index velho apontando pros chunks
         antigos → 404 'Failed to fetch dynamically imported module'. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- a11y: WCAG 1.4.4 — não desabilitar zoom (sem maximum-scale / user-scalable=no) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KAI - Kaleidos AI</title>
    <meta name="description" content="Plataforma de IA contextual para gerenciar perfis e criar conteúdo estratégico" />
    <meta name="author" content="Kaleidos Digital" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <!-- Anti-FOUC: aplica tema salvo antes do React montar
         (evita flash de light durante hydration do next-themes em Vite SPA) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kai-theme');
          var theme = stored || 'dark';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <!-- PWA Meta Tags -->
    <!-- theme-color alinhado com --primary do index.css.
         Light: pink Kaleidos hsl(320 55% 61%) = #d262b2.
         Dark: green kAI hsl(150 100% 50%) = #00ff80 (era #16a34a, green-600,
         que destoava da UI real). 2026-05-17. -->
    <meta name="theme-color" content="#d262b2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#00ff80" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="KAI - Kaleidos AI" />
    <meta property="og:description" content="Plataforma de IA contextual para gerenciar perfis e criar conteúdo estratégico" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kai.kaleidos.com.br" />
    <meta property="og:image" content="https://kai.kaleidos.com.br/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="KAI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KAI - Kaleidos AI" />
    <meta name="twitter:description" content="Plataforma de IA para criação de conteúdo estratégico" />
    <meta name="twitter:image" content="https://kai.kaleidos.com.br/og-image.svg" />
    
    <!-- Fonts — consolidados em UMA requisição combinada pra cortar 5 round trips
         pro Google Fonts (eram ~150-250ms render-blocking cada em 4G).
         Inter é a UI principal do KAI. As outras (Plus Jakarta, Instrument Serif,
         JetBrains Mono, DM Serif, Playfair, Outfit, Source Sans 3, Literata,
         Geist, Geist Mono, Fraunces) são usadas só dentro do viral-sv-original
         (templates de carrossel) — mas como o CSS é load uma vez e o browser
         cacheia, vale unificar. Fraunces + Geist (sans) adicionados 2026-05-19
         pro template madureira-minimal.
         display=swap pra texto aparecer instantâneo com fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;700&family=Geist+Mono:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:wght@400;500;600;700&family=Antic+Slab&family=Anton&family=DM+Serif+Display&family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=Literata:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;700&family=Geist+Mono:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:wght@400;500;600;700&family=Antic+Slab&family=Anton&family=DM+Serif+Display&family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=Literata:wght@400;500;600;700&display=swap"
    />

    <!-- DNS prefetch + preconnect pra endpoints críticos (Neon + Vercel Blob) -->
    <link rel="dns-prefetch" href="https://ep-sparkling-moon-acbufmuw-pooler.sa-east-1.aws.neon.tech">
    <link rel="dns-prefetch" href="https://ep-sparkling-moon-acbufmuw.apirest.sa-east-1.aws.neon.tech">
    <link rel="preconnect" href="https://ep-sparkling-moon-acbufmuw.apirest.sa-east-1.aws.neon.tech" crossorigin>
    <link rel="preconnect" href="https://ep-sparkling-moon-acbufmuw.neonauth.sa-east-1.aws.neon.tech" crossorigin>
    <link rel="dns-prefetch" href="https://blob.vercel-storage.com">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
